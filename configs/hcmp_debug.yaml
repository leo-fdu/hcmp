data:
  input_csv: data/bbbp_smiles.csv
  smiles_column: smiles
  processed_dir: data/processed
  descriptor_values_path: data/processed/descriptor_values.csv
  descriptor_thresholds: data/processed/descriptor_thresholds.csv
  scaffold_distance: data/processed/scaffold_distance.npy
  recompute_descriptors_in_dataset: false

training:
  num_epochs: 1
  graph_batch_size: 32
  learning_rate: 1.0e-3
  max_molecules: 128
  device: cpu

output:
  run_dir: null
  root_dir: runs/pretrain
  save_every_epochs: 10
  save_last: true
  save_best: true
  save_final: true

model:
  encoder:
    encoder_type: graph_transformer
    hidden_dim: 64
    num_layers: 2
    num_heads: 4
    dropout: 0.1
    attention_impl: loop
  pooling:
    type: node_edge_attention
    pooling_impl: loop
  heads:
    mlp_hidden_dim: 64

features:
  atomic_numbers: [1, 5, 6, 7, 8, 9, 15, 16, 17, 35, 53]
  formal_charge_clip: 3

bert:
  enabled: true
  atom_mask_ratio: 0.15
  bond_mask_ratio: 0.15
  atom_masking:
    masked_fields: [atomic_number, formal_charge, chirality]
    targets: [atomic_number]
  bond_masking:
    masked_fields: [bond_type, bond_stereo]
    targets: [bond_type]
    mask_endpoint_nodes: false

cut_seg:
  enabled: true
  input_representation: final_edge_embedding
  pos_weight: auto

descriptors:
  epsilon: 1.0e-4

prop_rank:
  enabled: true
  loss_type: pairwise_logistic
  threshold_quantile: 0.70
  partners_per_anchor: 10
  average: descriptor_then_mean
  descriptor_weights: {}

scaf_triplet:
  enabled: true
  min_distance_gap: 0.15
  margin: 0.15
  candidate_pairs_per_anchor: 10
  distance_backend: cache
  cache_path: data/processed/scaffold_distance_cache.sqlite
  sqlite_wal: true
  commit_every_misses: 1000
  max_in_memory_distances: 1000000
  max_in_memory_scaffolds: 200000
  average: mean_valid_triplets
  projection_head: true
  normalize_projection: true

loss_balancing:
  method: fixed
  weights:
    bert: 1.0
    cut_seg: 1.0
    prop_rank: 0.5
    scaf_triplet: 0.1

curriculum:
  enabled: true
  mode: convergence
  window_epochs: 20
  min_relative_improvement: 0.01
  max_relative_worsening: 0.02
  eps: 1.0e-8
  phases:
    - name: bert
      active_losses: [bert]
      monitor: bert
    - name: segmentation
      active_losses: [bert, cut_seg]
      monitor: cut_seg
    - name: property
      active_losses: [bert, cut_seg, prop_rank]
      monitor: prop_rank
    - name: distance
      active_losses: [bert, cut_seg, prop_rank, scaf_triplet]
      monitor: scaf_triplet
